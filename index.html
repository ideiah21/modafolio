};

// ===== STATE =====
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let DB, currentUser, currentBrand, currentCollection, currentFilter = 'all', confirmCallback = null;

function loadDB() {
  try { DB = JSON.parse(localStorage.getItem('via_db')) || { users: {} }; }
  catch { DB = { users: {} }; }
}
function saveDB() {
  try { localStorage.setItem('via_db', JSON.stringify(DB)); }
  catch(e) { showToast('Armazenamento cheio! Remova fotos grandes.'); }
}

function emptyCard() { return { photo:'', name:'', classification:'Base', fabric:'', colors:['#d4af37','#2d2d2d','#ffffff'], sale:0, feedback:'', coordination:'Bottom', archetype:'' }; }

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.remove('hidden'); t.classList.add('flex');
  setTimeout(()=>{ t.classList.add('hidden'); t.classList.remove('flex'); }, 3000);
}

// ===== CONFIRM =====
function showConfirm(msg, needPw, cb) {
  const m = document.getElementById('confirm-modal');
  document.getElementById('confirm-msg').textContent = msg;
  const pwI = document.getElementById('confirm-pw');
  const pwL = document.getElementById('confirm-pw-label');
  if (needPw) { pwI.classList.remove('hidden'); pwL.classList.remove('hidden'); pwI.value=''; }
  else { pwI.classList.add('hidden'); pwL.classList.add('hidden'); }
  confirmCallback = cb;
  document.getElementById('confirm-btn').onclick = () => { cb(pwI.value); closeConfirm(); };
  m.classList.remove('hidden'); m.classList.add('flex');
}
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('flex');
  document.getElementById('confirm-modal').classList.add('hidden');
}

function showView(id) {
  ['view-auth','view-dashboard','view-master','view-editor'].forEach(v => {
    const el = document.getElementById(v);

// ===== AUTH =====
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(b => {
    b.classList.toggle('text-gold', b.dataset.tab === tab);
    b.classList.toggle('border-gold', b.dataset.tab === tab);
    b.classList.toggle('text-gray-400', b.dataset.tab !== tab);
    b.classList.toggle('border-transparent', b.dataset.tab !== tab);
  });
  document.querySelectorAll('.auth-tab-content').forEach(c => {
    c.classList.toggle('hidden', c.id !== `auth-${tab}`);
  });
}

function handleLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if (!email || !pass) { err.textContent='Preencha e-mail e senha.'; err.classList.remove('hidden'); return; }

  if (email === 'admin@master.com') {
    if (!DB.users[email]) { DB.users[email] = { password: pass, brand:'Master', collections:{} }; saveDB(); }
    else if (DB.users[email].password !== pass) { err.textContent='Senha incorreta.'; err.classList.remove('hidden'); return; }
    currentUser = email;
    err.classList.add('hidden');
    renderMaster();
    showView('view-master');
    return;
  }

  if (!DB.users[email]) { err.textContent='Usuário não encontrado.'; err.classList.remove('hidden'); return; }
  if (DB.users[email].password !== pass) { err.textContent='Senha incorreta.'; err.classList.remove('hidden'); return; }
  
  currentUser = email;
  currentBrand = DB.users[email].brand;
  err.classList.add('hidden');
  renderDashboard();
  showView('view-dashboard');
}

function handleRegister() {
  const brand = document.getElementById('register-brand').value.trim();
  const email = document.getElementById('register-email').value.trim().toLowerCase();
  const pass = document.getElementById('register-pass').value;
  const passConfirm = document.getElementById('register-pass-confirm').value;
  const err = document.getElementById('register-error');
  
  if (!brand || !email || !pass) { err.textContent='Preencha todos os campos.'; err.classList.remove('hidden'); return; }
  if (pass !== passConfirm) { err.textContent='As senhas não coincidem.'; err.classList.remove('hidden'); return; }
  if (pass.length < 4) { err.textContent='A senha deve ter pelo menos 4 caracteres.'; err.classList.remove('hidden'); return; }
  if (DB.users[email]) { err.textContent='Este e-mail já está registrado.'; err.classList.remove('hidden'); return; }
  
  DB.users[email] = { password: pass, brand, collections:{} };
  saveDB();
  currentUser = email;
  currentBrand = brand;
  err.classList.add('hidden');
  showToast('Conta criada com sucesso!');
  renderDashboard();
  showView('view-dashboard');
}

function handleAdmin() {
  const pass = document.getElementById('admin-pass').value;
  const err = document.getElementById('admin-error');
  const adminPassword = 'Oleh11';

// ===== EDITOR =====
function calcAvg(cards) {
  const filled = cards.filter(c => c.sale > 0);
  if (filled.length === 0) return 0;
  return Math.round(filled.reduce((s,c) => s + c.sale, 0) / filled.length);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('border-gold', b.dataset.filter === f);
    b.classList.toggle('text-gold', b.dataset.filter === f);
  });
  renderGrid();
}

function renderCoordinationFilters() {
  const col = DB.users[currentUser].collections[currentCollection];
  const coordTypes = ['Bottom', 'Top', 'Vestido', 'Bottom Conjunto', 'Top Conjunto', 'Macacão', 'Over Piece'];
  const container = document.getElementById('coordination-filters');
  container.innerHTML = '<span class="text-xs text-gray-400 self-center mr-2">Coordenação:</span>';
  
  // Extract month from collection name (e.g., "Janeiro 2025" -> "01")
  const monthName = currentCollection.split(' ')[0];
  const monthIndex = MONTHS.indexOf(monthName) + 1;
  const monthKey = String(monthIndex).padStart(2, '0');
  const monthData = MONTHLY_MIX[monthKey];
  let targetMix = monthData ? monthData.mix : {};
  
  // Expand "Conjunto" into "Bottom Conjunto" and "Top Conjunto" equally
  if (targetMix['Conjunto']) {
    const conjuntoPct = targetMix['Conjunto'];
    targetMix = { ...targetMix };
    delete targetMix['Conjunto'];
    targetMix['Bottom Conjunto'] = (targetMix['Bottom Conjunto'] || 0) + Math.ceil(conjuntoPct / 2);
    targetMix['Top Conjunto'] = (targetMix['Top Conjunto'] || 0) + Math.floor(conjuntoPct / 2);
  }
  
  // Calculate actual percentages
  const filledCards = col.cards.filter(c => c.sale > 0);
  const totalCount = filledCards.length;
  
  const stats = {};
  coordTypes.forEach(type => {
    const cards = filledCards.filter(c => c.coordination === type);
    const avg = cards.length > 0 ? Math.round(cards.reduce((s, c) => s + c.sale, 0) / cards.length) : 0;
    const percentage = totalCount > 0 ? Math.round((cards.length / totalCount) * 100) : 0;
    const target = targetMix[type] || 0;
    stats[type] = { count: cards.length, avg, percentage, target };
  });

  // Calculate archetype distribution
  const allFilledCards = col.cards.filter(c => c.sale > 0);
  const archetypeA = allFilledCards.filter(c => c.archetype === 'A').length;
  const archetypeB = allFilledCards.filter(c => c.archetype === 'B').length;
  const archetypeC = allFilledCards.filter(c => c.archetype === 'C').length;
  const totalArch = archetypeA + archetypeB + archetypeC || 1;
  
  const archPctA = Math.round((archetypeA / totalArch) * 100);
  const archPctB = Math.round((archetypeB / totalArch) * 100);
  const archPctC = Math.round((archetypeC / totalArch) * 100);

  coordTypes.forEach(type => {
    const stat = stats[type];
    const btn = document.createElement('button');
    btn.className = 'coord-btn px-3 py-1 text-xs rounded border text-gray-300 hover:border-gold transition whitespace-nowrap';
    
    // Color based on alignment with target
    let borderClass = 'border-dark-border';
    let textClass = 'text-gray-300';
    if (stat.target > 0) {
      const diff = Math.abs(stat.percentage - stat.target);
      if (diff <= 5) {
        borderClass = 'border-green-500/60';
        textClass = 'text-green-400';
      } else if (diff <= 10) {
        borderClass = 'border-yellow-500/60';
        textClass = 'text-yellow-400';
      } else {
        borderClass = 'border-red-500/60';
        textClass = 'text-red-400';
      }
    }
    
    btn.className = `coord-btn px-3 py-1 text-xs rounded border ${borderClass} ${textClass} hover:border-gold transition whitespace-nowrap`;
    btn.dataset.coord = type;
    btn.textContent = `${type}: ${stat.count} · ${stat.percentage}% (target: ${stat.target}%)`;
    btn.title = `Atual: ${stat.percentage}% | Meta: ${stat.target}% | Diferença: ${Math.abs(stat.percentage - stat.target)}%`;
    btn.onclick = () => filterByCoordination(type);
    container.appendChild(btn);
  });

  // Add archetype distribution display
  const archDiv = document.createElement('div');
  archDiv.className = 'coord-btn px-3 py-1 text-xs rounded border border-dark-border text-gray-300 whitespace-nowrap';
  
  let archColText = 'Arquétipos: ';
  archColText += `🔵A ${archPctA}% (60-70%) · 🟡B ${archPctB}% (20-30%) · ⭐C ${archPctC}% (5-15%)`;
  
  let archBorderClass = 'border-dark-border';
  let archTextClass = 'text-gray-300';
  
  // Check if all are within ranges
  const aOk = archPctA >= 60 && archPctA <= 70;
  const bOk = archPctB >= 20 && archPctB <= 30;
  const cOk = archPctC >= 5 && archPctC <= 15;
  
  if (aOk && bOk && cOk) {
    archBorderClass = 'border-green-500/60';
    archTextClass = 'text-green-400';
  } else if ((Math.abs(archPctA - 65) <= 10) && (Math.abs(archPctB - 25) <= 10) && (Math.abs(archPctC - 10) <= 5)) {
    archBorderClass = 'border-yellow-500/60';
    archTextClass = 'text-yellow-400';
  } else {
    archBorderClass = 'border-red-500/60';
    archTextClass = 'text-red-400';
  }
  
  archDiv.className = `coord-btn px-3 py-1 text-xs rounded border ${archBorderClass} ${archTextClass} whitespace-nowrap ml-2`;
  archDiv.textContent = archColText;
  archDiv.title = `Distribuição dos Arquétipos de Young`;
  container.appendChild(archDiv);
}

function filterByCoordination(coordType) {
  currentFilter = `coord_${coordType}`;
  document.querySelectorAll('.filter-btn, .coord-btn').forEach(b => {
    b.classList.remove('border-gold', 'text-gold');
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  const col = DB.users[currentUser].collections[currentCollection];
  const weeks = ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'];
  let cardCount = 0;
  let currentWeek = 0;

  const addWeekHeader = (weekNum) => {
    const header = document.createElement('div');
    header.className = 'col-span-full';
    header.innerHTML = `<div class="mt-4 mb-2 px-2 py-2 border-b-2 border-gold/50"><span class="font-display text-gold text-lg font-bold">${weeks[weekNum]}</span></div>`;
    grid.appendChild(header);
  };

  addWeekHeader(0);

  col.cards.forEach((card, i) => {
    const newWeek = Math.floor(i / 18);
    if (newWeek !== currentWeek) {
      currentWeek = newWeek;
      addWeekHeader(currentWeek);
    }

    const isEmpty = !card.photo && !card.fabric && card.sale === 0 && !card.active;
    let show = true;
    if (currentFilter === 'best') show = card.sale > 70;
    else if (currentFilter === 'poor') show = card.sale < 60 && card.sale > 0;
    else if (currentFilter.startsWith('coord_')) {
      const coordType = currentFilter.replace('coord_', '');
      show = card.coordination === coordType && card.sale > 0;
    }
    if (!show && currentFilter !== 'all') return;

    const s = card.sale;
    let bgColor = '#ffffff';
    let borderColor = '#d1d5db';
    let textColor = '#1f2937';
    
    if (s > 0) {
      if (s <= 60) {
        bgColor = '#fee2e2';
        borderColor = '#fca5a5';
      } else if (s <= 79) {
        bgColor = '#fef3c7';
        borderColor = '#fcd34d';
      } else {
        bgColor = '#dcfce7';
        borderColor = '#86efac';
      }
    }

    const div = document.createElement('div');
    div.className = 'print-card border rounded-lg p-2 relative transition-all text-xs';
    div.style.backgroundColor = bgColor;
    div.style.borderColor = borderColor;
    div.style.color = textColor;
    div.draggable = true;
    div.dataset.idx = i;
    div.ondragstart = (e) => { e.dataTransfer.setData('text/plain', i); div.classList.add('card-drag'); };
    div.ondragend = () => div.classList.remove('card-drag');
    div.ondragover = (e) => { e.preventDefault(); div.classList.add('card-over'); };
    div.ondragleave = () => div.classList.remove('card-over');
    div.ondrop = (e) => { e.preventDefault(); div.classList.remove('card-over'); swapCards(parseInt(e.dataTransfer.getData('text/plain')), i); };

    if (isEmpty) {
      div.innerHTML = `<div class="flex items-center justify-center h-32"><button onclick="initCard(${i})" class="no-print w-10 h-10 rounded-full border border-dashed border-gray-300 text-gray-400 hover:border-gold hover:text-gold transition flex items-center justify-center text-lg">+</button></div><span class="absolute bottom-1 right-2 text-black text-[10px]">${i+1}</span>`;
    } else {
      const esc = (s) => (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      div.innerHTML = `
        <button onclick="clearCard(${i})" class="no-print absolute top-1 right-1 text-gray-600 hover:text-red-400 transition z-10"><i data-lucide="x" class="w-3 h-3"></i></button>
        <span class="absolute top-1 left-2 text-gray-600 text-[10px]">${i+1}</span>
        ${card.photo ? `<img src="${card.photo}" class="w-full h-20 object-cover rounded mb-1" alt="P${i+1}">` : `<label class="no-print w-full h-20 flex items-center justify-center border border-dashed border-gray-600 rounded mb-1 cursor-pointer hover:border-gold transition"><i data-lucide="camera" class="w-4 h-4 text-gray-500"></i><input type="file" accept="image/*" class="hidden" onchange="uploadPhoto(${i},this)"></label>`}
        <input type="text" value="${esc(card.name)}" placeholder="Nome do produto" onchange="updateField(${i},'name',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1 outline-none focus:border-gold">
        <select onchange="updateField(${i},'classification',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1 outline-none"><option ${card.classification==='Base'?'selected':''}>Base</option><option ${card.classification==='Meio'?'selected':''}>Meio</option><option ${card.classification==='Topo'?'selected':''}>Topo</option></select>
        <input type="text" value="${esc(card.fabric)}" placeholder="Tecido" onchange="updateField(${i},'fabric',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1 outline-none focus:border-gold">
        <select onchange="updateField(${i},'coordination',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1 outline-none"><option ${card.coordination==='Bottom'?'selected':''}>Bottom</option><option ${card.coordination==='Top'?'selected':''}>Top</option><option ${card.coordination==='Vestido'?'selected':''}>Vestido</option><option ${card.coordination==='Bottom Conjunto'?'selected':''}>Bottom Conjunto</option><option ${card.coordination==='Top Conjunto'?'selected':''}>Top Conjunto</option><option ${card.coordination==='Macacão'?'selected':''}>Macacão</option><option ${card.coordination==='Over Piece'?'selected':''}>Over Piece</option></select>
        <select onchange="updateField(${i},'archetype',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1 outline-none"><option value="">Sem Arquétipo</option><option ${card.archetype==='C'?'selected':''}>⭐ Arquétipo C (Premium 5-15%)</option><option ${card.archetype==='B'?'selected':''}>🟡 Arquétipo B (Agregado 20-30%)</option><option ${card.archetype==='A'?'selected':''}>🔵 Arquétipo A (Base 60-70%)</option></select>
        <div class="flex gap-1 mb-1 items-center justify-center">${[0,1,2].map(ci=>`<input type="color" value="${card.colors[ci]}" onchange="updateColor(${i},${ci},this.value)" class="w-5 h-5 rounded-full">`).join('')}</div>
        <div class="flex items-center gap-1 mb-1"><span class="text-gray-500 text-[10px]">%</span><input type="number" min="0" max="100" value="${s}" onchange="updateField(${i},'sale',Math.min(100,Math.max(0,parseInt(this.value)||0)))" class="no-print flex-1 bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 outline-none focus:border-gold w-8"><span class="text-[10px] font-bold ${s>70?'text-green-400':s>=40?'text-yellow-400':s>0?'text-red-400':'text-gray-500'}">${s}%</span></div>
        <textarea placeholder="Notas..." onchange="updateField(${i},'feedback',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 h-8 resize-none outline-none focus:border-gold">${esc(card.feedback)}</textarea>`;
    }
    grid.appendChild(div);
    cardCount++;
  });
  lucide.createIcons();
}

function initCard(i) {
  const col = DB.users[currentUser].collections[currentCollection];
  col.cards[i] = { photo:'', name:'', classification:'Base', fabric:'', colors:['#d4af37','#2d2d2d','#ffffff'], sale:0, feedback:'', coordination:'Bottom', archetype:'', active: true };
  saveDB(); renderGrid();
}

function clearCard(i) {
  DB.users[currentUser].collections[currentCollection].cards[i] = emptyCard();
  saveDB(); renderGrid(); updateAvg();
}

function updateField(i, field, val) {
  DB.users[currentUser].collections[currentCollection].cards[i][field] = val;
  saveDB(); updateAvg();
  if (field === 'sale' || field === 'coordination') { renderGrid(); renderCoordinationFilters(); }
}

function updateColor(i, ci, val) {
  DB.users[currentUser].collections[currentCollection].cards[i].colors[ci] = val;
  saveDB();
}

function updateAvg() {
  const col = DB.users[currentUser].collections[currentCollection];
  document.getElementById('editor-avg').textContent = calcAvg(col.cards) + '%';
}

function uploadPhoto(i, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 500000) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      const max = 300;
      let w = img.width, h = img.height;
      if (w > h) { h = h * max / w; w = max; } else { w = w * max / h; h = max; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      const data = canvas.toDataURL('image/jpeg', 0.6);
      if (data.length > 800000) { showToast('Imagem muito grande mesmo comprimida.'); return; }
      DB.users[currentUser].collections[currentCollection].cards[i].photo = data;
      saveDB(); renderGrid();
    };
    img.src = URL.createObjectURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = (e) => {
      DB.users[currentUser].collections[currentCollection].cards[i].photo = e.target.result;
      saveDB(); renderGrid();
    };
    reader.readAsDataURL(file);
  }
}

function swapCards(a, b) {
  if (a === b) return;
  const cards = DB.users[currentUser].collections[currentCollection].cards;
  [cards[a], cards[b]] = [cards[b], cards[a]];
  saveDB(); renderGrid();
  showToast(`Slots ${a+1} ↔ ${b+1} trocados.`);
}

function handlePrint() {
  document.getElementById('modal-new-col').classList.add('hidden');
  document.getElementById('confirm-modal').classList.add('hidden');
  setTimeout(() => {
    window.print();
  }, 50);
}
