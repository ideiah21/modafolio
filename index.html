<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V.I.A. Fashion Performance</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Source+Sans+3:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { bg: '#1a1a1a', card: '#2d2d2d', surface: '#232323', border: '#3a3a3a' },
            gold: { DEFAULT: '#d4af37', light: '#e8cc6e', dark: '#b8960e' },
          },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Source Sans 3', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
    .card-drag { opacity: 0.5; }
    .card-over { outline: 2px dashed #d4af37; outline-offset: -2px; }
    .view-transition { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .gold-shimmer { background: linear-gradient(90deg, #d4af37 0%, #e8cc6e 50%, #d4af37 100%); background-size: 200% 100%; animation: shimmer 3s infinite; }
    input[type="color"] { -webkit-appearance: none; border: none; padding: 0; cursor: pointer; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 2px solid #3a3a3a; border-radius: 50%; }
    
    /* Garantia de contraste nos cards (tela) */
    .print-card {
      color: #1f2937 !important;
    }
    .print-card input, .print-card select, .print-card textarea {
      color: #1f2937 !important;
      background-color: #ffffff !important;
    }
    
    /* Impressão / PDF - Layout fiel ao mapa com cores de fundo */
    @media print {
      .no-print { display: none !important; }
      body, #view-editor, .print-grid {
        background: white !important;
        margin: 0;
        padding: 0;
        overflow: visible !important;
      }
      .print-grid {
        display: grid !important;
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 12px !important;
        padding: 12px !important;
        margin: 0 auto !important;
      }
      .print-card {
        border: 1px solid #ccc !important;
        border-radius: 8px !important;
        break-inside: avoid;
        page-break-inside: avoid;
        padding: 8px !important;
        box-shadow: none !important;
        color: black !important;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
        color-adjust: exact;
      }
      .print-card {
        background-color: attr(data-bgcolor color) !important;
      }
      .print-card img {
        max-width: 100% !important;
        height: auto !important;
        display: block !important;
      }
      .print-card input, .print-card textarea, .print-card select, .print-card button, .print-card .no-print {
        display: none !important;
      }
      .print-static-content {
        display: block !important;
      }
      @page {
        size: landscape;
        margin: 0.5cm;
      }
    }
    .print-static-content {
      display: none;
    }
  </style>
</head>
<body class="h-full bg-white font-body text-gray-800 overflow-auto">
<div id="app" class="h-full w-full flex flex-col">
  <!-- TOAST -->
  <div id="toast" class="fixed top-4 right-4 z-[9999] hidden">
    <div class="bg-dark-card border border-gold/40 text-gold px-5 py-3 rounded-lg shadow-2xl flex items-center gap-2"><i data-lucide="info" class="w-4 h-4"></i><span id="toast-msg"></span></div>
  </div>
  <!-- CONFIRM MODAL -->
  <div id="confirm-modal" class="fixed inset-0 z-[9998] hidden items-center justify-center" style="background:rgba(0,0,0,0.7)">
    <div class="bg-dark-card border border-dark-border rounded-xl p-6 max-w-sm w-full mx-4 view-transition">
      <p id="confirm-msg" class="text-gray-200 font-body mb-4"></p>
      <label id="confirm-pw-label" class="block text-xs text-gray-400 mb-1 hidden">Senha da marca</label>
      <input id="confirm-pw" type="password" class="hidden w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-sm text-gray-200 mb-4 focus:border-gold outline-none">
      <div class="flex gap-3 justify-end"><button onclick="closeConfirm()" class="px-4 py-2 text-sm text-gray-400 hover:text-gray-200 transition">Cancelar</button><button id="confirm-btn" class="px-4 py-2 text-sm bg-red-700 hover:bg-red-600 text-white rounded transition">Confirmar</button></div>
    </div>
  </div>

  <!-- VIEW: AUTH -->
  <div id="view-auth" class="h-full w-full flex items-center justify-center p-4">
    <div class="w-full max-w-md view-transition">
      <div class="text-center mb-8">
        <h1 id="app-title" class="font-display text-4xl font-bold text-gold mb-2">V.I.A.</h1>
        <p class="text-gray-400 text-sm tracking-widest uppercase">Validação de Inteligência Arquetípica</p>
        <div class="w-16 h-0.5 gold-shimmer mx-auto mt-4 rounded"></div>
      </div>
      <div class="bg-dark-card border border-dark-border rounded-xl overflow-hidden">
        <div class="flex border-b border-dark-border">
          <button class="auth-tab flex-1 py-3 text-sm font-body border-b-2 border-gold text-gold transition cursor-pointer" data-tab="login" onclick="switchAuthTab('login')">Acessar</button>
          <button class="auth-tab flex-1 py-3 text-sm font-body border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition cursor-pointer" data-tab="register" onclick="switchAuthTab('register')">Novo Registro</button>
          <button class="auth-tab flex-1 py-3 text-sm font-body border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition cursor-pointer" data-tab="admin" onclick="switchAuthTab('admin')">Administrador</button>
        </div>
        <div id="auth-login" class="auth-tab-content p-6 space-y-4">
          <div><label class="block text-xs text-gray-400 mb-1 font-body">E-mail</label><input id="login-email" type="email" placeholder="seu@email.com" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-sm text-gray-200 focus:border-gold outline-none"></div>
          <div><label class="block text-xs text-gray-400 mb-1 font-body">Senha</label><input id="login-pass" type="password" placeholder="••••••••" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-sm text-gray-200 focus:border-gold outline-none"></div>
          <button onclick="handleLogin()" class="w-full py-3 bg-gold hover:bg-gold-light text-dark-bg font-bold rounded-lg transition text-sm">ENTRAR</button>
          <p id="login-error" class="text-red-400 text-xs text-center hidden"></p>
        </div>
        <div id="auth-register" class="auth-tab-content hidden p-6 space-y-4">
          <div><label class="block text-xs text-gray-400 mb-1">Marca</label><input id="register-brand" type="text" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-sm text-gray-200"></div>
          <div><label class="block text-xs text-gray-400 mb-1">E-mail</label><input id="register-email" type="email" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-sm text-gray-200"></div>
          <div><label class="block text-xs text-gray-400 mb-1">Senha</label><input id="register-pass" type="password" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-sm text-gray-200"></div>
          <div><label class="block text-xs text-gray-400 mb-1">Confirmar</label><input id="register-pass-confirm" type="password" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-sm text-gray-200"></div>
          <button onclick="handleRegister()" class="w-full py-3 bg-gold hover:bg-gold-light text-dark-bg font-bold rounded-lg transition text-sm">CRIAR CONTA</button>
          <p id="register-error" class="text-red-400 text-xs text-center hidden"></p>
        </div>
        <div id="auth-admin" class="auth-tab-content hidden p-6 space-y-4">
          <div><label class="block text-xs text-gray-400 mb-1">Senha Admin</label><input id="admin-pass" type="password" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-sm text-gray-200"></div>
          <button onclick="handleAdmin()" class="w-full py-3 bg-gold hover:bg-gold-light text-dark-bg font-bold rounded-lg transition text-sm">ACESSAR PAINEL GLOBAL</button>
          <p id="admin-error" class="text-red-400 text-xs text-center hidden"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- VIEW: DASHBOARD (usuários comuns) -->
  <div id="view-dashboard" class="h-full w-full hidden flex-col">
    <header class="no-print flex items-center justify-between px-6 py-4 border-b border-dark-border bg-dark-surface/80">
      <div class="flex items-center gap-3"><span class="font-display text-xl text-gold font-bold">V.I.A.</span><span class="text-gray-500">|</span><span id="dash-brand" class="text-gray-300 text-sm"></span></div>
      <div class="flex items-center gap-3"><span id="dash-user-email" class="text-gray-500 text-xs hidden sm:inline"></span><button onclick="logout()" class="text-gray-400 hover:text-gold"><i data-lucide="log-out" class="w-5 h-5"></i></button></div>
    </header>
    <div class="flex-1 overflow-auto p-6 view-transition">
      <div class="flex items-center justify-between mb-6"><h2 class="font-display text-2xl text-gray-100">Coleções</h2><button onclick="openNewCollection()" class="flex items-center gap-2 px-4 py-2 bg-gold/10 border border-gold/30 text-gold rounded-lg hover:bg-gold/20 text-sm"><i data-lucide="plus" class="w-4 h-4"></i> Nova Coleção</button></div>
      <div id="collections-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
      <p id="no-collections" class="text-gray-500 text-center py-16 hidden">Nenhuma coleção criada ainda.</p>
    </div>
  </div>

  <!-- VIEW: MASTER (administrador) -->
  <div id="view-master" class="h-full w-full hidden flex-col">
    <header class="no-print flex items-center justify-between px-6 py-4 border-b border-dark-border bg-dark-surface/80">
      <div class="flex items-center gap-3"><span class="font-display text-xl text-gold font-bold">V.I.A. Master</span><span class="text-xs text-gold/70 ml-2">(Administrador Global)</span></div>
      <div class="flex gap-2">
        <button onclick="exportFullBackup()" class="px-3 py-1 text-xs rounded border border-gold/50 text-gold hover:bg-gold/10 transition flex items-center gap-1"><i data-lucide="save-all" class="w-3 h-3"></i> Backup Completo</button>
        <button onclick="document.getElementById('restoreBackupInput').click()" class="px-3 py-1 text-xs rounded border border-gold/50 text-gold hover:bg-gold/10 transition flex items-center gap-1"><i data-lucide="upload" class="w-3 h-3"></i> Restaurar Backup</button>
        <input type="file" id="restoreBackupInput" accept=".json" style="display:none" onchange="if(this.files.length) importFullBackup(this.files[0]); this.value='';">
        <button onclick="logout()" class="text-gray-400 hover:text-gold ml-2"><i data-lucide="log-out" class="w-5 h-5"></i></button>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-6 view-transition">
      <h2 class="font-display text-2xl text-gray-100 mb-6">Todas as Marcas e Coleções</h2>
      <div id="master-list" class="space-y-6"></div>
    </div>
  </div>

  <!-- VIEW: EDITOR -->
  <div id="view-editor" class="h-full w-full hidden flex-col">
    <header class="no-print flex items-center justify-between px-4 py-3 border-b border-dark-border bg-dark-surface/80 flex-wrap gap-3">
      <div class="flex items-center gap-3">
        <button onclick="backFromEditor()" class="text-gray-400 hover:text-gold"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <div>
          <span id="editor-brand" class="font-display text-lg text-gold"></span>
          <span id="editor-period" class="text-gray-400 text-sm ml-2"></span>
          <span id="admin-mode-badge" class="hidden ml-2 text-xs bg-red-500/20 text-red-300 px-2 py-0.5 rounded-full">Modo Admin</span>
        </div>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <div class="flex items-center gap-2"><span class="text-xs text-gray-400">Média:</span><span id="editor-avg" class="text-gold font-bold text-sm">0%</span></div>
        <div class="flex gap-1"><button onclick="setFilter('all')" class="filter-btn px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold" data-filter="all">Mapa</button><button onclick="setFilter('best')" class="filter-btn px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold" data-filter="best">Best</button><button onclick="setFilter('poor')" class="filter-btn px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold" data-filter="poor">Poor</button></div>
        <div class="h-5 w-px bg-dark-border"></div>
        <button onclick="exportCollectionJSON()" class="px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold flex items-center gap-1"><i data-lucide="save" class="w-3 h-3"></i>Salvar JSON</button>
        <button onclick="document.getElementById('loadJsonInput').click()" class="px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold flex items-center gap-1"><i data-lucide="upload" class="w-3 h-3"></i>Carregar JSON</button>
        <input type="file" id="loadJsonInput" accept=".json" style="display:none" onchange="if(this.files.length) importCollectionJSON(this.files[0]); this.value='';">
        <div class="h-5 w-px bg-dark-border"></div>
        <button onclick="printFilter('all')" class="px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold"><i data-lucide="printer" class="w-3 h-3 inline mr-1"></i>Mapa PDF</button>
        <button onclick="printFilter('best')" class="px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold"><i data-lucide="printer" class="w-3 h-3 inline mr-1"></i>Best PDF</button>
        <button onclick="printFilter('poor')" class="px-3 py-1 text-xs rounded border border-dark-border text-gray-300 hover:border-gold"><i data-lucide="printer" class="w-3 h-3 inline mr-1"></i>Poor PDF</button>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-3">
      <div id="coordination-filters" class="mb-4 pb-3 border-b border-dark-border flex flex-wrap gap-2"></div>
      <!-- SEÇÃO ARQUÉTIPOS COM CONTRASTE MELHORADO (fundo sólido, texto branco) -->
      <div id="archetype-stats" class="mb-4 pb-3 border-b border-dark-border"></div>
      <div id="product-grid" class="print-grid grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-9 gap-2"></div>
    </div>
  </div>

  <!-- MODAL: NOVA COLEÇÃO -->
  <div id="modal-new-col" class="fixed inset-0 z-[9997] hidden items-center justify-center overflow-y-auto" style="background:rgba(0,0,0,0.7)">
    <div class="bg-dark-card border border-dark-border rounded-xl p-6 max-w-sm w-full mx-4 my-8">
      <h3 class="font-display text-lg text-gold mb-4">Nova Coleção</h3>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div><label class="block text-xs text-gray-400">Mês</label><select id="new-col-month" onchange="updateMixDisplay()" class="w-full bg-dark-bg border border-gold/40 rounded px-3 py-2 text-sm text-gold"><option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option><option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option><option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option><option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option></select></div>
        <div><label class="block text-xs text-gray-400">Ano</label><input id="new-col-year" type="number" value="2025" class="w-full bg-dark-bg border border-gold/40 rounded px-3 py-2 text-sm text-gold"></div>
      </div>
      <div id="mix-display" class="bg-dark-bg border border-dark-border rounded p-3 mb-4 text-gray-300 text-xs max-h-40 overflow-y-auto"></div>
      <label class="block text-xs text-gray-200 mb-1 font-semibold">Ocasiões de Uso (múltiplas)</label>
      <div class="bg-dark-bg border border-dark-border rounded p-3 mb-4 max-h-24 overflow-y-auto space-y-1">
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Casual"> Casual</label>
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Trabalho"> Trabalho</label>
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Social"> Social</label>
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Festa"> Festa</label>
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Praia"> Praia</label>
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Esportes"> Esportes</label>
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Viagem"> Viagem</label>
        <label class="flex items-center gap-2 text-gray-200 text-xs"><input type="checkbox" class="occasion-check" value="Festa de Fim de Ano"> Festa de Fim de Ano</label>
      </div>
      <label class="block text-xs text-green-400 mb-1">⭐ Topo (C) - 5-15% Premium</label>
      <select id="new-col-archetype-c" class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-sm text-gray-200 mb-3"><option value="Classic">Clássico</option><option value="Romantic">Romântico</option><option value="Gamine">Gamine</option><option value="Natural">Natural</option><option value="Sexy">Sexy</option><option value="Ingenue">Ingênue</option><option value="Dramatic">Dramático</option><option value="Creative">Criativo</option><option value="Trendy">Trendy</option><option value="Sporty">Sporty</option><option value="Ethereal">Etéreo</option><option value="Edgy">Edgy</option></select>
      <label class="block text-xs text-yellow-400 mb-1">🟡 Meio (B) - 20-30% Agregado</label>
      <select id="new-col-archetype-b" class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-sm text-gray-200 mb-3"><option value="Classic">Clássico</option><option value="Romantic">Romântico</option><option value="Gamine">Gamine</option><option value="Natural">Natural</option><option value="Sexy">Sexy</option><option value="Ingenue">Ingênue</option><option value="Dramatic">Dramático</option><option value="Creative">Criativo</option><option value="Trendy">Trendy</option><option value="Sporty">Sporty</option><option value="Ethereal">Etéreo</option><option value="Edgy">Edgy</option></select>
      <label class="block text-xs text-blue-400 mb-1">🔵 Base (A) - 60-70% Fundacional</label>
      <select id="new-col-archetype-a" class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-sm text-gray-200 mb-4"><option value="Classic">Clássico</option><option value="Romantic">Romântico</option><option value="Gamine">Gamine</option><option value="Natural">Natural</option><option value="Sexy">Sexy</option><option value="Ingenue">Ingênue</option><option value="Dramatic">Dramático</option><option value="Creative">Criativo</option><option value="Trendy">Trendy</option><option value="Sporty">Sporty</option><option value="Ethereal">Etéreo</option><option value="Edgy">Edgy</option></select>
      <div class="flex gap-3 justify-end"><button onclick="closeModal('modal-new-col')" class="px-4 py-2 text-sm text-gray-400">Cancelar</button><button onclick="createCollection()" class="px-4 py-2 text-sm bg-gold text-dark-bg font-bold rounded">Criar</button></div>
    </div>
  </div>
</div>

<script>
// ===== DADOS MENSAIS =====
const MONTHLY_MIX = {
  '01': { occasion: 'Liquidação / Inverno', mix: { 'Top': 40, 'Bottom': 25, 'Vestido': 15, 'Conjunto': 10, 'Macacão': 5, 'Over Piece': 5 }, strategy: 'A: Tops/Bottoms | B: Vestido | C: Conjuntos' },
  '02': { occasion: 'Eventos Culturais', mix: { 'Top': 35, 'Bottom': 25, 'Conjunto': 15, 'Vestido': 15, 'Macacão': 5, 'Over Piece': 5 }, strategy: 'A: Tops/Bottoms | B: Conjuntos | C: Vestidos' },
  '03': { occasion: 'Outono', mix: { 'Bottom': 30, 'Top': 30, 'Over Piece': 15, 'Conjunto': 10, 'Vestido': 10, 'Macacão': 5 }, strategy: 'A: Bottoms/Tops | B: Over Pieces | C: Conjuntos' },
  '04': { occasion: 'Transição', mix: { 'Top': 30, 'Over Piece': 25, 'Bottom': 20, 'Conjunto': 15, 'Vestido': 5, 'Macacão': 5 }, strategy: 'A: Tops | B: Over Pieces | C: Conjuntos' },
  '05': { occasion: 'Datas Comemorativas', mix: { 'Vestido': 25, 'Conjunto': 20, 'Top': 20, 'Bottom': 15, 'Over Piece': 15, 'Macacão': 5 }, strategy: 'A: Tops | B: Vestidos | C: Premium' },
  '06': { occasion: 'Festas Noturnas', mix: { 'Over Piece': 30, 'Bottom': 25, 'Top': 20, 'Conjunto': 10, 'Vestido': 10, 'Macacão': 5 }, strategy: 'A: Bottoms | B: Tops | C: Over Pieces' },
  '07': { occasion: 'Frio Intenso', mix: { 'Over Piece': 35, 'Top': 25, 'Bottom': 20, 'Conjunto': 10, 'Macacão': 5, 'Vestido': 5 }, strategy: 'A: Tops manga longa | B: Bottoms | C: Over Pieces' },
  '08': { occasion: 'Primavera', mix: { 'Top': 35, 'Bottom': 25, 'Vestido': 15, 'Conjunto': 15, 'Over Piece': 5, 'Macacão': 5 }, strategy: 'A: Tops/Bottoms | B: Conjuntos | C: Vestidos' },
  '09': { occasion: 'Renovação', mix: { 'Vestido': 30, 'Top': 25, 'Bottom': 20, 'Macacão': 10, 'Conjunto': 10, 'Over Piece': 5 }, strategy: 'A: Tops/Bottoms | B: Vestidos | C: Macacões' },
  '10': { occasion: 'Promoções', mix: { 'Top': 40, 'Bottom': 20, 'Conjunto': 15, 'Vestido': 15, 'Macacão': 5, 'Over Piece': 5 }, strategy: 'A: Tops | B: Bottoms | C: Conjuntos/Vestidos' },
  '11': { occasion: 'Black Friday', mix: { 'Bottom': 30, 'Top': 30, 'Conjunto': 15, 'Vestido': 10, 'Macacão': 10, 'Over Piece': 5 }, strategy: 'A: Bottoms/Tops | B: Conjuntos | C: Macacões' },
  '12': { occasion: 'Fim de Ano', mix: { 'Vestido': 40, 'Macacão': 15, 'Top': 15, 'Conjunto': 15, 'Bottom': 10, 'Over Piece': 5 }, strategy: 'A: Tops | B: Conjuntos | C: Vestidos/Macacões' }
};

// FUNÇÃO RENDERIZA ARQUÉTIPOS COM ALTO CONTRASTE (FUNDO SÓLIDO, TEXTO BRANCO)
function renderArchetypeStats() {
  const container = document.getElementById('archetype-stats');
  if (!container) return;
  const col = getCurrentCollectionData();
  const filledCards = col.cards.filter(c => c.sale > 0);
  const total = filledCards.length;
  if (total === 0) {
    container.innerHTML = '<div class="text-sm text-gray-200 bg-gray-800 p-2 rounded-md">📊 Nenhum produto com venda para análise de arquétipos.</div>';
    return;
  }
  const counts = { A: 0, B: 0, C: 0 };
  filledCards.forEach(card => {
    if (card.archetype === 'A') counts.A++;
    else if (card.archetype === 'B') counts.B++;
    else if (card.archetype === 'C') counts.C++;
  });
  let pct = {
    A: Math.round((counts.A / total) * 100),
    B: Math.round((counts.B / total) * 100),
    C: Math.round((counts.C / total) * 100)
  };
  const sum = pct.A + pct.B + pct.C;
  if (sum !== 100) pct.A += 100 - sum;
  
  const targets = {
    A: { min: 60, max: 75 },
    B: { min: 20, max: 30 },
    C: { min: 5, max: 15 }
  };
  
  const getStyle = (type, value) => {
    const { min, max } = targets[type];
    if (value >= min && value <= max) {
      return 'background: #0e6b2f; color: #ffffff; border-left: 4px solid #2ecc71;';
    }
    if (value >= min-5 && value <= max+5) {
      return 'background: #b8860b; color: #ffffff; border-left: 4px solid #f1c40f;';
    }
    return 'background: #a12222; color: #ffffff; border-left: 4px solid #e74c3c;';
  };
  
  container.innerHTML = `
    <div class="flex flex-wrap items-center gap-3 py-2 px-1 rounded-md">
      <span class="text-sm font-bold text-gold">📊 ARQUÉTIPOS (target ideal):</span>
      <div class="flex gap-3 flex-wrap">
        <div class="px-3 py-1.5 text-sm rounded-md font-bold shadow-md" style="${getStyle('A', pct.A)}">🔵 BASE (A): ${pct.A}% <span style="font-weight:normal; opacity:0.9;">(60-75%)</span></div>
        <div class="px-3 py-1.5 text-sm rounded-md font-bold shadow-md" style="${getStyle('B', pct.B)}">🟡 MEIO (B): ${pct.B}% <span style="font-weight:normal; opacity:0.9;">(20-30%)</span></div>
        <div class="px-3 py-1.5 text-sm rounded-md font-bold shadow-md" style="${getStyle('C', pct.C)}">⭐ TOPO (C): ${pct.C}% <span style="font-weight:normal; opacity:0.9;">(5-15%)</span></div>
      </div>
      <span class="text-xs text-gray-300 bg-gray-800 px-2 py-1 rounded-md">📦 Total com venda: ${total}</span>
    </div>
  `;
}

function renderCoordinationFilters() {
  const col = getCurrentCollectionData();
  const coordTypes = ['Bottom', 'Top', 'Vestido', 'Bottom Conjunto', 'Top Conjunto', 'Macacão', 'Over Piece'];
  const container = document.getElementById('coordination-filters');
  container.innerHTML = '<span class="text-xs text-gray-400 self-center mr-2">Coordenação:</span>';
  const monthName = currentCollection.split(' ')[0];
  const monthIndex = MONTHS.indexOf(monthName) + 1;
  const monthKey = String(monthIndex).padStart(2, '0');
  const monthData = MONTHLY_MIX[monthKey];
  let targetMix = monthData ? monthData.mix : {};
  if (targetMix['Conjunto']) {
    const conjuntoPct = targetMix['Conjunto'];
    targetMix = { ...targetMix };
    delete targetMix['Conjunto'];
    targetMix['Bottom Conjunto'] = (targetMix['Bottom Conjunto'] || 0) + Math.ceil(conjuntoPct / 2);
    targetMix['Top Conjunto'] = (targetMix['Top Conjunto'] || 0) + Math.floor(conjuntoPct / 2);
  }
  const filledCards = col.cards.filter(c => c.sale > 0);
  const totalCount = filledCards.length;
  const stats = {};
  coordTypes.forEach(type => {
    const cards = filledCards.filter(c => c.coordination === type);
    const percentage = totalCount > 0 ? Math.round((cards.length / totalCount) * 100) : 0;
    const target = targetMix[type] || 0;
    stats[type] = { count: cards.length, percentage, target };
  });
  coordTypes.forEach(type => {
    const stat = stats[type];
    const btn = document.createElement('button');
    let borderClass = 'border-dark-border', textClass = 'text-gray-300';
    if (stat.target > 0) {
      const diff = Math.abs(stat.percentage - stat.target);
      if (diff <= 5) { borderClass = 'border-green-500/60'; textClass = 'text-green-400'; }
      else if (diff <= 10) { borderClass = 'border-yellow-500/60'; textClass = 'text-yellow-400'; }
      else { borderClass = 'border-red-500/60'; textClass = 'text-red-400'; }
    }
    btn.className = `coord-btn px-3 py-1 text-xs rounded border ${borderClass} ${textClass} hover:border-gold transition whitespace-nowrap`;
    btn.dataset.coord = type;
    btn.textContent = `${type}: ${stat.count} · ${stat.percentage}% (target: ${stat.target}%)`;
    btn.onclick = () => filterByCoordination(type);
    container.appendChild(btn);
  });
  renderArchetypeStats();
}

function updateField(i, field, val) { const col = getCurrentCollectionData(); const card = col.cards[i]; card[field] = val; if (field !== 'active') card.active = true; updateCurrentCollectionData(col); saveDB(); updateAvg(); if (field === 'sale' || field === 'coordination' || field === 'archetype') { renderGrid(); renderCoordinationFilters(); } else { renderGrid(); } }

function replacePhoto(i, input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { const col = getCurrentCollectionData(); const card = col.cards[i]; card.photo = e.target.result; card.active = true; updateCurrentCollectionData(col); saveDB(); renderGrid(); showToast('Imagem substituída'); }; reader.readAsDataURL(file); }

function renderGrid() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  const col = getCurrentCollectionData();
  const weeks = ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'];
  let currentWeek = 0;
  const addWeekHeader = (weekNum) => {
    const header = document.createElement('div');
    header.className = 'col-span-full no-print';
    header.innerHTML = `<div class="mt-4 mb-2 px-2 py-2 border-b-2 border-gold/50"><span class="font-display text-gold text-lg font-bold">${weeks[weekNum]}</span></div>`;
    grid.appendChild(header);
  };
  addWeekHeader(0);
  
  col.cards.forEach((card, i) => {
    const newWeek = Math.floor(i / 18);
    if (newWeek !== currentWeek) {
      currentWeek = newWeek;
      addWeekHeader(currentWeek);
    }
    let show = true;
    if (currentFilter === 'best') show = card.sale > 70;
    else if (currentFilter === 'poor') show = card.sale < 60 && card.sale > 0;
    else if (currentFilter.startsWith('coord_')) {
      const coordType = currentFilter.replace('coord_', '');
      show = card.coordination === coordType && card.sale > 0;
    }
    if (!show && currentFilter !== 'all') return;
    
    const s = card.sale;
    let bgColor = '#ffffff', borderColor = '#d1d5db';
    if (s > 0) {
      if (s <= 60) { bgColor = '#fee2e2'; borderColor = '#fca5a5'; }
      else if (s <= 79) { bgColor = '#fef3c7'; borderColor = '#fcd34d'; }
      else { bgColor = '#dcfce7'; borderColor = '#86efac'; }
    }
    const div = document.createElement('div');
    div.className = 'print-card border rounded-lg p-2 relative transition-all text-xs';
    div.style.backgroundColor = bgColor;
    div.style.borderColor = borderColor;
    div.setAttribute('data-bgcolor', bgColor);
    div.draggable = true;
    div.dataset.idx = i;
    div.ondragstart = (e) => { e.dataTransfer.setData('text/plain', i); div.classList.add('card-drag'); };
    div.ondragend = () => div.classList.remove('card-drag');
    div.ondragover = (e) => { e.preventDefault(); div.classList.add('card-over'); };
    div.ondragleave = () => div.classList.remove('card-over');
    div.ondrop = (e) => { e.preventDefault(); div.classList.remove('card-over'); swapCards(parseInt(e.dataTransfer.getData('text/plain')), i); };
    const esc = (s) => (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    const isEmpty = (!card.photo && !card.fabric && card.sale === 0 && card.active === false);
    if (isEmpty) {
      div.innerHTML = `<div class="flex items-center justify-center h-32"><button onclick="initCard(${i})" class="no-print w-10 h-10 rounded-full border border-dashed border-gray-300 text-gray-400 hover:border-gold hover:text-gold transition flex items-center justify-center text-lg">+</button></div><span class="absolute bottom-1 right-2 text-black text-[10px]">${i+1}</span>`;
    } else {
      let imageHtml = '';
      if (card.photo) {
        imageHtml = `<div class="relative"><img src="${card.photo}" class="w-full h-20 object-cover rounded mb-1"><button onclick="document.getElementById('fileInput_${i}').click()" class="no-print absolute bottom-1 right-1 bg-black/50 rounded-full p-0.5 text-white hover:bg-gold transition"><i data-lucide="camera" class="w-3 h-3"></i></button><input type="file" id="fileInput_${i}" accept="image/*" class="hidden" onchange="replacePhoto(${i}, this)"></div>`;
      } else {
        imageHtml = `<label class="no-print w-full h-20 flex items-center justify-center border border-dashed border-gray-600 rounded mb-1 cursor-pointer hover:border-gold transition"><i data-lucide="camera" class="w-4 h-4 text-gray-500"></i><input type="file" accept="image/*" class="hidden" onchange="uploadPhoto(${i},this)"></label>`;
      }
      const archOptions = `<option value="">Sem Arquétipo</option><option value="A" ${card.archetype === 'A' ? 'selected' : ''}>🔵 Arquétipo A (Base)</option><option value="B" ${card.archetype === 'B' ? 'selected' : ''}>🟡 Arquétipo B (Meio)</option><option value="C" ${card.archetype === 'C' ? 'selected' : ''}>⭐ Arquétipo C (Topo)</option>`;
      
      const staticContent = `
        <div class="print-static-content">
          <div class="font-bold text-xs mb-1">${esc(card.name) || '—'}</div>
          <div class="text-[10px]">Classificação: ${card.classification}</div>
          <div class="text-[10px]">Tecido: ${esc(card.fabric) || '—'}</div>
          <div class="text-[10px]">Coordenação: ${card.coordination}</div>
          <div class="text-[10px]">Arquétipo: ${card.archetype === 'A' ? '🔵 Base' : card.archetype === 'B' ? '🟡 Meio' : card.archetype === 'C' ? '⭐ Topo' : '—'}</div>
          <div class="flex gap-1 my-1">${card.colors.map(c => `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background-color:${c};border:1px solid #999;"></span>`).join('')}</div>
          <div class="text-[10px] font-bold">Venda: ${s}%</div>
          <div class="text-[10px]">Notas: ${esc(card.feedback) || '—'}</div>
        </div>
      `;
      
      div.innerHTML = `
        <button onclick="clearCard(${i})" class="no-print absolute top-1 right-1 text-gray-600 hover:text-red-400 transition z-10"><i data-lucide="x" class="w-3 h-3"></i></button>
        <span class="absolute top-1 left-2 text-gray-600 text-[10px]">${i+1}</span>
        ${imageHtml}
        <input type="text" value="${esc(card.name)}" placeholder="Nome" onchange="updateField(${i},'name',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1">
        <select onchange="updateField(${i},'classification',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1"><option ${card.classification==='Base'?'selected':''}>Base</option><option ${card.classification==='Meio'?'selected':''}>Meio</option><option ${card.classification==='Topo'?'selected':''}>Topo</option></select>
        <input type="text" value="${esc(card.fabric)}" placeholder="Tecido" onchange="updateField(${i},'fabric',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1">
        <select onchange="updateField(${i},'coordination',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1"><option ${card.coordination==='Bottom'?'selected':''}>Bottom</option><option ${card.coordination==='Top'?'selected':''}>Top</option><option ${card.coordination==='Vestido'?'selected':''}>Vestido</option><option ${card.coordination==='Bottom Conjunto'?'selected':''}>Bottom Conjunto</option><option ${card.coordination==='Top Conjunto'?'selected':''}>Top Conjunto</option><option ${card.coordination==='Macacão'?'selected':''}>Macacão</option><option ${card.coordination==='Over Piece'?'selected':''}>Over Piece</option></select>
        <select onchange="updateField(${i},'archetype',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] text-gray-800 mb-1">${archOptions}</select>
        <div class="flex gap-1 mb-1 no-print">${[0,1,2].map(ci=>`<input type="color" value="${card.colors[ci]}" onchange="updateColor(${i},${ci},this.value)" class="w-5 h-5 rounded-full">`).join('')}</div>
        <div class="flex items-center gap-1 no-print"><span class="text-gray-500 text-[10px]">%</span><input type="number" min="0" max="100" value="${s}" onchange="updateField(${i},'sale',Math.min(100,Math.max(0,parseInt(this.value)||0)))" class="no-print flex-1 bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] w-8"><span class="text-[10px] font-bold ${s>70?'text-green-400':s>=40?'text-yellow-400':s>0?'text-red-400':'text-gray-500'}">${s}%</span></div>
        <textarea placeholder="Notas..." onchange="updateField(${i},'feedback',this.value)" class="no-print w-full bg-white border border-gray-300 rounded px-1 py-0.5 text-[10px] h-8 resize-none">${esc(card.feedback)}</textarea>
        ${staticContent}
      `;
    }
    grid.appendChild(div);
  });
  lucide.createIcons();
}

// ===== JSON e PDF =====
function exportCollectionJSON() { if (!currentCollection) return; const col = getCurrentCollectionData(); const exportData = { version: "1.0", collectionName: currentCollection, brand: currentBrand, occasions: col.occasions, archetypeA: col.archetypeA, archetypeB: col.archetypeB, archetypeC: col.archetypeC, cards: col.cards.map(c => ({ ...c })) }; const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${currentCollection.replace(/ /g, '_')}_via.json`; a.click(); URL.revokeObjectURL(blob); showToast("Exportado JSON."); }
function importCollectionJSON(file) { if (!currentCollection) return; const reader = new FileReader(); reader.onload = (e) => { try { const data = JSON.parse(e.target.result); if (!data.cards || data.cards.length !== 72) throw new Error("cards inválido"); const owner = getCurrentUserForCollection(); const password = DB.users[owner].password; showConfirm(`Substituir "${currentCollection}"?`, true, (pw) => { if (pw !== password) { showToast("Senha incorreta."); return; } const col = getCurrentCollectionData(); col.cards = data.cards.map(c => ({ ...c, active: c.active === undefined ? true : c.active })); col.occasions = data.occasions || []; col.archetypeA = data.archetypeA || ''; col.archetypeB = data.archetypeB || ''; col.archetypeC = data.archetypeC || ''; updateCurrentCollectionData(col); saveDB(); renderEditor(); showToast("JSON carregado."); }); } catch(err) { showToast("Erro JSON: " + err.message); } }; reader.readAsText(file); }
function printFilter(filterType) { setFilter(filterType); setTimeout(() => { window.print(); }, 400); }

// ===== INIT =====
loadDB();
lucide.createIcons();
</script>
